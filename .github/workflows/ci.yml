name: CI

on:
  push:
    branches: [main, develop]
  pull_request: 
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: techconnect
          POSTGRES_PASSWORD: techconnect
          POSTGRES_DB: techconnect_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
        working-directory: backend
      
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend

      - name: Run migrations
        run: npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: postgresql://techconnect:techconnect@localhost:5433/techconnect_test

      - name: Run tests
        run: npm test
        working-directory: backend
        env:
          DATABASE_URL: postgresql://techconnect:techconnect@localhost:5433/techconnect_test
          JWT_SECRET: ci-test-secret